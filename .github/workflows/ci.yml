name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      # Keep reporting lower-severity advisories without failing CI on
      # transitive issues that do not yet have a compatible upstream fix.
      - run: npm audit --omit=dev --audit-level=high
